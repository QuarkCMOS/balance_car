; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    electroniccats/MPU6050 @ ^1.3.0
    links2004/WebSockets   @ ^2.4.0
    bblanchon/ArduinoJson  @ ^6.21.0
    littlemanbuilds/ESP32_MCPWM @ ^1.1.1

build_flags =
    -std=gnu++17

monitor_speed = 115200

; ─── Test env ────────────────────────────────────────────────────
[env:esp32dev_test]
platform  = espressif32
board     = esp32dev
framework = arduino

; Chỉ build file test — exclude toàn bộ src/ thật
src_filter =
    -<*>
    +<../test/test_motor_pwm.cpp>

; Thêm src/ vào include path để test tìm được config/pins.h, config/constants.h
build_flags =
    -std=gnu++17
    -D TEST_MODE
    -I src

monitor_speed = 115200