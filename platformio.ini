[env:native]
platform = native
build_flags = 
	-std=c++17
	-lm
test_build_src_filter = 
	+<test_control.cpp>
	+<test_complementary_filter.cpp>
lib_deps = adafruit/Adafruit MPU6050@^2.2.9

[env:native_filter_test]
